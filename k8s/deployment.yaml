apiVersion: apps/v1
kind: Deployment
metadata:
  name: angular-app-deployment
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: portfolio-os
  template:
    metadata:
      labels:
        app: portfolio-os
    spec:
      containers:
      - name: angular-container
        image: portfolioos.azurecr.io/portfolio-os:latest
        ports:
        - containerPort: 80
      imagePullSecrets:
      - name: acr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: angular-app-service
spec:
  type: LoadBalancer
  selector:
    app: portfolio-os
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
