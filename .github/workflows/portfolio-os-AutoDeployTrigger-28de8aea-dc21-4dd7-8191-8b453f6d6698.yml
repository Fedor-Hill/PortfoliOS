name: Trigger auto deployment for portfolio-os

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/portfolio-os-AutoDeployTrigger-28de8aea-dc21-4dd7-8191-8b453f6d6698.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.PORTFOLIOOS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PORTFOLIOOS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PORTFOLIOOS_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          push: true
          tags: portfolioos.azurecr.io/portfolio-os:latest
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: Dockerfile
          registryUrl: portfolioos.azurecr.io
          registryUsername: ${{ secrets.PORTFOLIOOS_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PORTFOLIOOS_REGISTRY_PASSWORD }}
          containerAppName: portfolio-os
          resourceGroup: NetworkWatcherRG
          imageToBuild: portfolioos.azurecr.io/portfolio-os:${{ github.sha }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: PortfolioOSResourceGroup
          cluster-name: portfolios-os-cluster

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment portfolio-os-angular-app-deployment
